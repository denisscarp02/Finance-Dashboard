<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinScope Terminal</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0e17;
  --text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;
  --accent:#38bdf8;--accent2:#06d6a0;
  --green:#34d399;--red:#f87171;--orange:#fbbf24;--purple:#a78bfa;
  --sw:224px;--th:62px;--r:16px;--rs:10px;
}
html{scroll-behavior:smooth}
body{
  font-family:'Inter',sans-serif;color:var(--text);min-height:100vh;overflow-x:hidden;
  background:var(--bg);
  /* Colored blobs behind glass */
  background-image:
    radial-gradient(ellipse 50% 50% at 15% 10%,rgba(56,189,248,0.12),transparent),
    radial-gradient(ellipse 40% 40% at 85% 20%,rgba(167,139,250,0.08),transparent),
    radial-gradient(ellipse 50% 40% at 50% 80%,rgba(6,214,160,0.07),transparent),
    radial-gradient(ellipse 30% 30% at 70% 60%,rgba(244,114,182,0.05),transparent);
  background-attachment:fixed;
}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.07);border-radius:2px}

/* ===== GLASS ===== */
.glass{
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(28px) saturate(140%);-webkit-backdrop-filter:blur(28px) saturate(140%);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:var(--r);
  box-shadow:
    0 8px 32px rgba(0,0,0,0.2),
    inset 0 1px 0 rgba(255,255,255,0.08),
    inset 0 -1px 0 rgba(255,255,255,0.02);
  transition:border-color .3s;
}
.glass:hover{border-color:rgba(255,255,255,0.18)}
.glass-strong{
  background:rgba(255,255,255,0.09);
  border-color:rgba(255,255,255,0.16);
  box-shadow:0 8px 40px rgba(0,0,0,0.25),inset 0 1px 0 rgba(255,255,255,0.1);
}

/* ===== LOGIN ===== */
.lo{position:fixed;inset:0;z-index:9999;
  background:var(--bg);
  background-image:radial-gradient(ellipse 60% 50% at 50% 30%,rgba(56,189,248,0.1),transparent),radial-gradient(ellipse 40% 40% at 80% 70%,rgba(167,139,250,0.06),transparent);
  display:flex;align-items:center;justify-content:center;transition:opacity .5s,visibility .5s}
.lo.h{opacity:0;visibility:hidden;pointer-events:none}
.lo-card{
  background:rgba(255,255,255,0.07);
  backdrop-filter:blur(40px) saturate(150%);-webkit-backdrop-filter:blur(40px) saturate(150%);
  border:1px solid rgba(255,255,255,0.15);border-radius:22px;
  padding:44px 40px;width:410px;max-width:92vw;text-align:center;
  box-shadow:0 12px 64px rgba(0,0,0,0.35),inset 0 1px 0 rgba(255,255,255,0.1);
}
.lo-br{font-size:12px;letter-spacing:5px;text-transform:uppercase;color:var(--accent);margin-bottom:28px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:10px}
.lo-dots{display:grid;grid-template-columns:repeat(3,1fr);gap:3px}.lo-dots span{background:var(--accent);border-radius:2px;width:7px;height:7px}
.lo-card h1{font-size:24px;font-weight:700;margin-bottom:4px}
.lo-card .sub{color:var(--text2);font-size:13px;margin-bottom:30px}
.lo-f{position:relative;margin-bottom:14px}
.lo-f svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);width:16px;height:16px}
.lo-f input{width:100%;padding:13px 14px 13px 42px;border-radius:var(--rs);border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border .2s}
.lo-f input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(56,189,248,0.08)}
.lo-f input::placeholder{color:var(--text3)}
.lo-btn{width:100%;padding:13px;border:none;border-radius:var(--rs);background:linear-gradient(135deg,rgba(56,189,248,0.85),rgba(14,165,233,0.95));color:#fff;font-size:14px;font-weight:600;cursor:pointer;margin-top:6px;transition:all .2s;box-shadow:0 4px 16px rgba(56,189,248,0.15)}
.lo-btn:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(56,189,248,0.25)}
.lo-divider{display:flex;align-items:center;gap:12px;margin:18px 0;color:var(--text3);font-size:11px}
.lo-divider::before,.lo-divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.08)}
.lo-bio{width:100%;padding:13px;border:none;border-radius:var(--rs);background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.lo-bio:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.15)}
.lo-bio svg{width:20px;height:20px}
.lo-err{color:var(--red);font-size:12px;margin-top:12px;display:none}
.lo-foot{color:var(--text3);font-size:11px;margin-top:18px}

/* ===== APP ===== */
.app{display:none;min-height:100vh}.app.on{display:flex}

/* ===== SIDEBAR ===== */
.sb{
  width:var(--sw);position:fixed;top:0;left:0;bottom:0;z-index:100;
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(28px) saturate(130%);-webkit-backdrop-filter:blur(28px) saturate(130%);
  border-right:1px solid rgba(255,255,255,0.08);
  display:flex;flex-direction:column;padding:16px 10px;transition:transform .3s;
}
.sb-hd{display:flex;align-items:center;gap:8px;padding:4px 10px 20px;border-bottom:1px solid rgba(255,255,255,0.06);margin-bottom:12px}
.sb-lg{display:grid;grid-template-columns:repeat(3,1fr);gap:2px}.sb-lg span{background:var(--accent);border-radius:2px;width:6px;height:6px}
.sb-nm{font-weight:700;font-size:13px;letter-spacing:3px;text-transform:uppercase}
.sb-nav{flex:1;overflow-y:auto}
.ni{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:var(--rs);color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;margin-bottom:1px;border:1px solid transparent}
.ni:hover{background:rgba(255,255,255,0.05);color:var(--text)}
.ni.on{background:linear-gradient(135deg,rgba(56,189,248,0.14),rgba(56,189,248,0.05));color:var(--accent);border-color:rgba(56,189,248,0.18);font-weight:600}
.ni svg{width:16px;height:16px;flex-shrink:0}
.sb-ft{padding-top:10px;border-top:1px solid rgba(255,255,255,0.06);margin-top:auto}

/* ===== TOPBAR ===== */
.tb{position:fixed;top:0;left:var(--sw);right:0;height:var(--th);background:rgba(255,255,255,0.03);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:space-between;padding:0 22px;z-index:90}
.tb-hi{font-size:15px;font-weight:700}.tb-hi em{font-style:normal}
.tb-sub{font-size:10px;color:var(--text3)}
.tb-r{display:flex;align-items:center;gap:7px}
.tb-pill{display:flex;align-items:center;gap:4px;padding:5px 10px;border-radius:14px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);font-size:9.5px;color:var(--text2);font-family:'JetBrains Mono',monospace}
.tb-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pls 2s infinite}
@keyframes pls{0%,100%{opacity:1}50%{opacity:.3}}
.tb-b{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;color:var(--text2);cursor:pointer;transition:all .2s}
.tb-b:hover{border-color:var(--accent);color:var(--accent)}
.mob{display:none!important}

/* ===== MAIN ===== */
.mn{margin-left:var(--sw);margin-top:var(--th);padding:20px 22px}
.pg{display:none}.pg.on{display:block;animation:fi .3s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sh h2{font-size:17px;font-weight:700}
.sh-lk{color:var(--accent);font-size:11px;cursor:pointer}
.card-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.card-h span{font-weight:600;font-size:12.5px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px}
.mt{margin-top:16px}
.p0{padding:0!important}

/* ===== MARKET CARD ===== */
.mk{background:rgba(255,255,255,0.05);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.09);border-radius:var(--r);padding:14px;cursor:pointer;transition:all .3s}
.mk:hover{border-color:rgba(255,255,255,0.2);transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,0.25)}
.mk-h{display:flex;align-items:center;gap:7px;margin-bottom:8px}
.mk-badge{padding:3px 6px;border-radius:4px;font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace}
.mk-n{font-weight:600;font-size:11.5px}.mk-t{font-size:9px;color:var(--text3)}
.mk-c{font-size:10px;font-weight:600;margin-left:auto}
.mk-ch{height:36px;margin:3px 0}
.mk-p{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:700}

/* ===== TABLE ===== */
.at{width:100%;border-collapse:collapse}
.at th{text-align:left;padding:9px 11px;font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);border-bottom:1px solid rgba(255,255,255,0.06);font-weight:500}
.at td{padding:9px 11px;border-bottom:1px solid rgba(255,255,255,0.025);font-size:12px}
.at tbody tr{transition:background .2s;cursor:pointer}.at tbody tr:hover{background:rgba(255,255,255,0.03)}
.at-n{font-weight:600}.at-t{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent)}
.at-m{font-family:'JetBrains Mono',monospace;font-weight:600}
.bd{padding:2px 6px;border-radius:4px;font-size:8.5px;font-weight:700;font-family:'JetBrains Mono',monospace}
.bd-b{background:rgba(52,211,153,.12);color:var(--green)}.bd-s{background:rgba(248,113,113,.12);color:var(--red)}.bd-h{background:rgba(251,191,36,.12);color:var(--orange)}

/* ===== DONUT ===== */
.dn-w{display:flex;align-items:center;justify-content:center;position:relative}
.dn-c{position:absolute;text-align:center}
.dn-c .p{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700}
.dn-c .l{font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:1px}
.lg{display:flex;flex-direction:column;gap:7px}.lg-i{display:flex;align-items:center;gap:6px}
.lg-d{width:7px;height:7px;border-radius:50%}.lg-n{font-size:11px;color:var(--text2)}.lg-p{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;margin-left:auto}

/* ===== FILTERS ===== */
.flt{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.fb{padding:5px 11px;border-radius:6px;font-size:10px;font-weight:600;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:var(--text2);cursor:pointer;transition:all .2s;font-family:inherit}
.fb:hover{border-color:var(--accent);color:var(--accent)}
.fb.on{background:rgba(56,189,248,.1);border-color:rgba(56,189,248,.2);color:var(--accent)}

/* ===== SEARCH ===== */
.ts{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:6px;padding:4px 8px}
.ts input{border:none;background:transparent;color:var(--text);font-size:11px;outline:none;width:110px;font-family:inherit}

/* ===== ADD MODAL ===== */
.add-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);z-index:1100;display:none;align-items:center;justify-content:center;padding:24px}
.add-bg.on{display:flex}
.add-box{background:rgba(255,255,255,0.07);backdrop-filter:blur(40px);border:1px solid rgba(255,255,255,0.14);border-radius:18px;padding:28px;width:460px;max-width:95vw;box-shadow:0 16px 60px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,0.08)}
.add-box h3{font-size:16px;font-weight:700;margin-bottom:16px}
.add-tabs{display:flex;gap:4px;margin-bottom:16px}
.add-tab{padding:6px 14px;border-radius:7px;font-size:11px;font-weight:600;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:var(--text2);cursor:pointer}
.add-tab.on{background:rgba(56,189,248,.1);border-color:rgba(56,189,248,.2);color:var(--accent)}
.add-field{margin-bottom:12px}
.add-field label{display:block;font-size:10px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.add-field input,.add-field select{width:100%;padding:10px 12px;border-radius:var(--rs);border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:var(--text);font-size:12px;font-family:inherit;outline:none}
.add-field input:focus{border-color:var(--accent)}
.add-submit{padding:10px 20px;border:none;border-radius:var(--rs);background:linear-gradient(135deg,var(--accent),#0ea5e9);color:#fff;font-size:12px;font-weight:600;cursor:pointer;margin-top:4px}
.add-msg{font-size:11px;margin-top:8px;color:var(--green);display:none}

/* ===== CHART MODAL ===== */
.mo-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(5px);z-index:1000;display:none;align-items:center;justify-content:center;padding:24px}
.mo-bg.on{display:flex}
.mo{background:rgba(16,20,30,.92);backdrop-filter:blur(40px);border:1px solid rgba(255,255,255,0.12);border-radius:16px;width:100%;max-width:920px;overflow:hidden;box-shadow:0 20px 70px rgba(0,0,0,.4)}
.mo-t{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid rgba(255,255,255,0.06)}
.mo-ti{font-size:14px;font-weight:700}
.mo-x{width:28px;height:28px;border-radius:6px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px}
.mo-x:hover{border-color:var(--red);color:var(--red)}
.mo-b iframe{width:100%;height:480px;border:none}

/* ===== STATUS ===== */
.sts{padding:10px 14px;border-radius:var(--rs);background:rgba(56,189,248,.05);border:1px solid rgba(56,189,248,.1);color:var(--accent);font-size:11px;margin-bottom:12px;display:none;align-items:center;gap:7px}
.sts.on{display:flex}.sts.err{background:rgba(248,113,113,.05);border-color:rgba(248,113,113,.1);color:var(--red)}
.spin{width:12px;height:12px;border:2px solid rgba(56,189,248,.2);border-top-color:var(--accent);border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

.sel{width:100%;padding:10px;border-radius:var(--rs);border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:var(--text);font-size:12px;font-family:inherit;outline:none;appearance:none;cursor:pointer}
.sel option{background:#1a2035}

@media(max-width:1024px){.sb{transform:translateX(-100%)}.sb.open{transform:translateX(0)}.mn,.tb{margin-left:0!important;left:0!important}.g2,.g3{grid-template-columns:1fr}.mob{display:flex!important}.tb{padding:0 12px}.mn{padding:14px 10px}}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="lo" id="LO">
<div class="lo-card">
  <div class="lo-br"><div class="lo-dots"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>FINSCOPE</div>
  <h1>Please Log In</h1>
  <div class="sub">to your FinScope Workspace</div>
  <div class="lo-f"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg><input type="password" id="pw" placeholder="Password" autocomplete="off"></div>
  <button class="lo-btn" onclick="doLogin()">Sign In</button>
  <div class="lo-divider">oppure</div>
  <button class="lo-bio" id="bioBtn" onclick="bioLogin()" style="display:none">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 11c0 3.517-1.009 6.799-2.753 9.571"/><path d="M2.05 12.056a10 10 0 0 1 .78-3.06"/><path d="M6.46 17.38a10.14 10.14 0 0 1-3.42-5.33"/><path d="M8.54 2.99A10 10 0 0 1 22 12c0 .28-.01.56-.03.84"/><path d="M12 2a10 10 0 0 0-9.95 9"/><path d="M15 12.5a3 3 0 1 1-6 0"/></svg>
    Accedi con Touch ID
  </button>
  <div class="lo-err" id="lerr">Password non valida</div>
  <div class="lo-foot">FinScope Terminal v4.0</div>
</div>
</div>

<!-- APP -->
<div class="app" id="APP">
<aside class="sb" id="SB">
  <div class="sb-hd"><div class="sb-lg"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div><div class="sb-nm">FinScope</div></div>
  <div class="sb-nav" id="navItems"></div>
  <div class="sb-ft">
    <div class="ni" onclick="fetchAll()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>Aggiorna</div>
    <div class="ni" onclick="sessionStorage.clear();location.reload()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Logout</div>
  </div>
</aside>

<header class="tb">
  <div style="display:flex;align-items:center;gap:8px">
    <div class="tb-b mob" onclick="document.getElementById('SB').classList.toggle('open')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></div>
    <div><div class="tb-hi">Hi, Deniss! <em>👋</em></div><div class="tb-sub">Welcome to your Workspace</div></div>
  </div>
  <div class="tb-r">
    <div class="tb-pill"><span class="tb-dot"></span><span id="clk">—</span></div>
    <div class="tb-b" onclick="fetchAll()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg></div>
    <div class="tb-b" onclick="showAdd()" title="Aggiungi asset" style="color:var(--accent);font-weight:700;font-size:16px">+</div>
    <div class="tb-b" style="border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:700;font-size:11px;border:none">D</div>
  </div>
</header>

<main class="mn" id="mainContent"></main>
</div>

<!-- ADD ASSET MODAL -->
<div class="add-bg" id="addBg" onclick="if(event.target===this)hideAdd()">
<div class="add-box">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <h3>Aggiungi Asset</h3>
    <button class="mo-x" onclick="hideAdd()">✕</button>
  </div>
  <div class="add-tabs">
    <div class="add-tab on" onclick="switchAddTab('url',this)">Da URL</div>
    <div class="add-tab" onclick="switchAddTab('manual',this)">Manuale</div>
    <div class="add-tab" onclick="switchAddTab('isin',this)">ISIN</div>
  </div>
  <div id="addUrl">
    <div class="add-field"><label>Incolla URL (Yahoo Finance, Google Finance, TradingView, Investing.com, Borsa Italiana)</label><input id="addUrlInput" placeholder="https://finance.yahoo.com/quote/AAPL"></div>
  </div>
  <div id="addManual" style="display:none">
    <div class="add-field"><label>Ticker</label><input id="addTicker" placeholder="AAPL, VWCE.DE, BTC-USD..."></div>
    <div class="add-field"><label>Nome (opzionale)</label><input id="addName" placeholder="Apple Inc."></div>
  </div>
  <div id="addIsin" style="display:none">

async function bioLogin(){
  try{
    // Check if credential exists
    const cred=localStorage.getItem('fs_bio_cred');
    if(!cred){
      // Register new credential
      const challenge=crypto.getRandomValues(new Uint8Array(32));
      const userId=crypto.getRandomValues(new Uint8Array(16));
      const createOpts={publicKey:{
        challenge,rp:{name:'FinScope',id:location.hostname||'localhost'},
        user:{id:userId,name:'deniss',displayName:'Deniss'},
        pubKeyCredParams:[{alg:-7,type:'public-key'},{alg:-257,type:'public-key'}],
        authenticatorSelection:{authenticatorAttachment:'platform',userVerification:'required'},
        timeout:60000
      }};
      const credential=await navigator.credentials.create(createOpts);
      localStorage.setItem('fs_bio_cred',credential.id);
      authOk();
    }else{
      // Authenticate with existing credential
      const challenge=crypto.getRandomValues(new Uint8Array(32));
      const getOpts={publicKey:{
        challenge,rpId:location.hostname||'localhost',
        allowCredentials:[{id:Uint8Array.from(atob(cred.replace(/-/g,'+').replace(/_/g,'/')),c=>c.charCodeAt(0)),type:'public-key',transports:['internal']}],
        userVerification:'required',timeout:60000
      }};
      await navigator.credentials.get(getOpts);
      authOk();
    }
  }catch(e){
    console.log('Bio auth error:',e);
    // Fallback: if platform auth available, just verify
    try{
      const challenge=crypto.getRandomValues(new Uint8Array(32));
      const cred=await navigator.credentials.create({publicKey:{
        challenge,rp:{name:'FinScope',id:location.hostname||'localhost'},
        user:{id:crypto.getRandomValues(new Uint8Array(16)),name:'deniss',displayName:'Deniss'},
        pubKeyCredParams:[{alg:-7,type:'public-key'}],
        authenticatorSelection:{authenticatorAttachment:'platform',userVerification:'required'},timeout:60000}});
      if(cred){localStorage.setItem('fs_bio_cred',cred.id);authOk();}
    }catch(e2){document.getElementById('lerr').textContent='Touch ID non disponibile';document.getElementById('lerr').style.display='block';}

// ===== FETCH DATA =====
// Method 1: Finnhub (CORS native, works in sandbox)
async function fhQuote(sym){
  try{
    const r=await fetch(`https://finnhub.io/api/v1/quote?symbol=${sym}&token=${FH_KEY}`,{signal:AbortSignal.timeout(8000)});
    if(!r.ok)return null;
    const d=await r.json();
    if(d&&d.c>0)return{symbol:sym,regularMarketPrice:d.c,regularMarketChangePercent:d.dp,regularMarketChange:d.d,shortName:sym,quoteType:'EQUITY'};
  }catch(e){}
  return null;
}

// Method 2: Yahoo v8 Chart (works without auth, v7 is DEAD)
async function yv8(ticker){
  const url=`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(ticker)}?range=1d&interval=1d&includePrePost=false`;
  for(const px of PX){
    try{
      const r=await fetch(px(url),{signal:AbortSignal.timeout(10000)});
      if(!r.ok)continue;
      let d;try{d=await r.json();}catch(e){continue;}
      const meta=d?.chart?.result?.[0]?.meta;
      if(meta&&meta.regularMarketPrice>0){
        const price=meta.regularMarketPrice;
        const prev=meta.previousClose||meta.chartPreviousClose||price;
        const chg=prev?((price-prev)/prev*100):0;
        return{symbol:meta.symbol||ticker,shortName:meta.shortName||meta.symbol||ticker,regularMarketPrice:price,regularMarketChangePercent:chg,quoteType:meta.instrumentType||'EQUITY'};
      }
    }catch(e){continue;}
  }
  return null;
}
async function yBatch(tickers){
  const results=[];
  for(const t of tickers){
    const r=await yv8(t);
    if(r)results.push(r);
    await slp(300);
  }
  return results;
}

// Method 3: CoinGecko (CORS native)
async function cgPrices(ids){
  try{
    const r=await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids.join(',')}&vs_currencies=usd&include_24hr_change=true`,{signal:AbortSignal.timeout(8000)});
    if(!r.ok)return{};return await r.json();
  }catch(e){return{};}
}

const slp=ms=>new Promise(r=>setTimeout(r,ms));

// Smart fetch: Finnhub for US stocks, Yahoo v8 for everything else
async function fetchList(list,type){
  const results=[];
  const usSimple=list.filter(x=>!x.t.includes('.')&&!x.t.includes('=')&&!x.t.includes('-')&&!x.t.includes('^'));
  const rest=list.filter(x=>!usSimple.includes(x));

  // 1) Finnhub for US stocks (2 at a time to avoid rate limit)
  for(let i=0;i<usSimple.length;i+=2){
    const batch=usSimple.slice(i,i+2);
    const proms=batch.map(x=>fhQuote(x.t).then(d=>{if(d){d.shortName=x.n||d.shortName;return d;}return null;}));
    const res=await Promise.all(proms);
    results.push(...res.filter(Boolean));
    if(i+2<usSimple.length)await slp(350);
  }

  // 2) Yahoo v8 for EU/Asian/special tickers
  for(const item of rest){
    const d=await yv8(item.t);
    if(d){d.shortName=item.n||d.shortName;results.push(d);}
    await slp(350);
  }

  // 3) Any US tickers Finnhub missed → try Yahoo v8
  const got=new Set(results.map(r=>r.symbol));
  const missed=usSimple.filter(x=>!got.has(x.t));
  for(const item of missed){
    const d=await yv8(item.t);
    if(d){d.shortName=item.n||d.shortName;results.push(d);}
    await slp(350);
  }

  return results;
}

}

  }catch(e){showSts('Errore: '+e.message,true);}

  [...st,...et,...bo,...co,...cr,...fx].forEach(q=>{if(q?.symbol)AP[q.symbol]=q;});
  rS([...st.slice(0,4),...cr.slice(0,2),co[0]].filter(Boolean));
  rT('tA',st,true);rT('tE',et);rT('tB',bo);rT('tC',co);rT('tCr',cr);rFx(fx);
  rCS(cr.slice(0,6));rDn(st,et,cr,co,bo);rMv([...st,...et,...cr]);rPf([...st,...et,...cr]);

  document.getElementById('clk').textContent=new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'})+' · Live';
  setTimeout(hideSts,2000);
}

// ===== RENDERERS =====
const fm=(n,d=2)=>n==null||isNaN(n)?'—':Number(n).toLocaleString('it-IT',{minimumFractionDigits:d,maximumFractionDigits:d});
const cc=v=>v>=0?'var(--green)':'var(--red)';const cp=v=>v>=0?'+':'';

function spark(cv,chg){const ctx=cv.getContext('2d'),w=cv.parentElement.clientWidth||160,h=36;cv.width=w;cv.height=h;const pts=14,data=[];let v=50;for(let i=0;i<pts;i++){v+=(Math.random()-.45+(chg>0?.12:-.12))*5;v=Math.max(10,Math.min(90,v));data.push(v);}if(chg>0)data[pts-1]=Math.max(...data)*.95;else data[pts-1]=Math.min(...data)*1.05;const mn=Math.min(...data),mx=Math.max(...data),rg=mx-mn||1;const col=chg>=0?'#34d399':'#f87171';ctx.clearRect(0,0,w,h);const gd=ctx.createLinearGradient(0,0,0,h);gd.addColorStop(0,col+'20');gd.addColorStop(1,col+'00');ctx.beginPath();data.forEach((v,i)=>{const x=i/(pts-1)*w,y=h-((v-mn)/rg)*(h-4)-2;i?ctx.lineTo(x,y):ctx.moveTo(x,y);});ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.closePath();ctx.fillStyle=gd;ctx.fill();ctx.beginPath();data.forEach((v,i)=>{const x=i/(pts-1)*w,y=h-((v-mn)/rg)*(h-4)-2;i?ctx.lineTo(x,y):ctx.moveTo(x,y);});ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.stroke();}

function mkCard(q){const chg=q.regularMarketChangePercent||0,p=q.regularMarketPrice||0,n=q.shortName||q.symbol,tk=q.symbol.replace('-USD','').replace('=F','');const col=q.symbol.includes('-USD')?'#22d3ee':q.symbol.includes('=F')?'#fbbf24':'#38bdf8';const uid='s'+Math.random().toString(36).substr(2,6);return{html:`<div class="mk" onclick="oMod('${q.symbol}','${n.replace(/'/g,"\\'")}')"><div class="mk-h"><span class="mk-badge" style="background:${col}15;color:${col}">${tk.substring(0,5)}</span><div><div class="mk-n">${n.substring(0,18)}</div><div class="mk-t">${q.quoteType||''}</div></div><span class="mk-c" style="color:${cc(chg)}">${cp(chg)}${fm(chg)}%</span></div><div class="mk-ch"><canvas id="${uid}" height="36"></canvas></div><div class="mk-p">${p>999?'$'+fm(p,0):'$'+fm(p,p<1?4:2)}</div></div>`,uid,chg};}

function rS(data){const el=document.getElementById('mS');if(!el)return;const cards=data.map(mkCard);el.innerHTML=cards.map(c=>c.html).join('');cards.forEach(c=>{const cv=document.getElementById(c.uid);if(cv)spark(cv,c.chg);});}
function rCS(data){const el=document.getElementById('cS');if(!el)return;const cards=data.map(mkCard);el.innerHTML=cards.map(c=>c.html).join('');cards.forEach(c=>{const cv=document.getElementById(c.uid);if(cv)spark(cv,c.chg);});}

function rT(id,data,sig=false){const tb=document.querySelector(`#${id} tbody`);if(!tb)return;tb.innerHTML=data.map(q=>{const p=q.regularMarketPrice||0,chg=q.regularMarketChangePercent||0,n=q.shortName||q.symbol;const s=chg>2?'b':chg<-2?'s':'h',sl={b:'BUY',s:'SELL',h:'HOLD'}[s];return`<tr onclick="oMod('${q.symbol}','${n.replace(/'/g,"\\'")}')"><td><span class="at-t">${q.symbol}</span></td><td><span class="at-n">${n.substring(0,24)}</span></td><td class="at-m">${p>999?'$'+fm(p,0):'$'+fm(p,p<1?4:2)}</td><td class="at-m" style="color:${cc(chg)}">${cp(chg)}${fm(chg)}%</td>${sig?`<td><span class="bd bd-${s}">${sl}</span></td>`:''}<td>↗</td></tr>`;}).join('');}

function rFx(data){const tb=document.querySelector('#tFx tbody');if(!tb)return;tb.innerHTML=data.map(q=>{const r=q.regularMarketPrice||0,chg=q.regularMarketChangePercent||0;return`<tr onclick="oMod('${q.symbol}','${q.symbol.replace("=X","")}')"><td class="at-t" style="font-size:12px">${q.symbol.replace('=X','')}</td><td class="at-m">${fm(r,4)}</td><td class="at-m" style="color:${cc(chg)}">${cp(chg)}${fm(chg)}%</td><td>↗</td></tr>`;}).join('');}

function rDn(st,et,cr,co,bo){const ct={Azioni:st.length,ETF:et.length,Crypto:cr.length,Comm:co.length,Bond:bo.length};const tot=Object.values(ct).reduce((a,b)=>a+b,0)||1;const cols=['#38bdf8','#a78bfa','#22d3ee','#fbbf24','#34d399'];const items=Object.entries(ct).map(([k,v],i)=>({n:k,p:Math.round(v/tot*100),c:cols[i]}));const cv=document.getElementById('dC');if(cv){const ctx=cv.getContext('2d');cv.width=140;cv.height=140;let sa=-Math.PI/2;ctx.clearRect(0,0,140,140);items.forEach(p=>{const sw=p.p/100*Math.PI*2;ctx.beginPath();ctx.arc(70,70,54,sa,sa+sw);ctx.strokeStyle=p.c;ctx.lineWidth=13;ctx.lineCap='round';ctx.stroke();sa+=sw+0.04;});}document.getElementById('dP').textContent=tot;document.getElementById('dL').innerHTML=items.map(p=>`<div class="lg-i"><div class="lg-d" style="background:${p.c}"></div><span class="lg-n">${p.n}</span><span class="lg-p">${p.p}%</span></div>`).join('');}

function rMv(all){const sorted=all.filter(q=>q.regularMarketChangePercent!=null).sort((a,b)=>Math.abs(b.regularMarketChangePercent)-Math.abs(a.regularMarketChangePercent)).slice(0,8);const el=document.getElementById('tmB');if(!el)return;el.innerHTML=sorted.map(q=>{const chg=q.regularMarketChangePercent||0,p=q.regularMarketPrice||0;const s=chg>2?'b':chg<-2?'s':'h',sl={b:'BUY',s:'SELL',h:'HOLD'}[s];return`<tr onclick="oMod('${q.symbol}','${(q.shortName||q.symbol).replace(/'/g,"\\'")}')"><td><span class="at-n">${(q.shortName||q.symbol).substring(0,18)}</span><br><span class="at-t">${q.symbol}</span></td><td class="at-m">$${fm(p,p<1?4:2)}</td><td class="at-m" style="color:${cc(chg)}">${cp(chg)}${fm(chg)}%</td><td><span class="bd bd-${s}">${sl}</span></td></tr>`;}).join('');}

function rPf(all){const valid=all.filter(q=>q.regularMarketChangePercent!=null);const cnt=valid.length,avg=valid.reduce((s,q)=>s+(q.regularMarketChangePercent||0),0)/(cnt||1);const top=valid.sort((a,b)=>(b.regularMarketChangePercent||0)-(a.regularMarketChangePercent||0))[0];if(document.getElementById('sT'))document.getElementById('sT').textContent=cnt;const sA=document.getElementById('sA');if(sA){sA.textContent=cp(avg)+fm(avg)+'%';sA.style.color=cc(avg);}if(document.getElementById('sG'))document.getElementById('sG').textContent=top?(top.shortName||top.symbol).substring(0,14):'—';const cv=document.getElementById('pC');if(!cv)return;const ctx=cv.getContext('2d'),w=cv.parentElement.clientWidth-40,h=120;cv.width=w;cv.height=h;ctx.clearRect(0,0,w,h);const sample=valid.slice(0,Math.min(35,valid.length));const maxC=Math.max(...sample.map(q=>Math.abs(q.regularMarketChangePercent||0)),1);const bw=Math.min(w/sample.length-2,12),mid=h/2;sample.forEach((q,i)=>{const chg=q.regularMarketChangePercent||0,bh=Math.abs(chg)/maxC*(mid-6);const x=i*(bw+2)+2,y=chg>=0?mid-bh:mid;ctx.fillStyle=chg>=0?'#34d39950':'#f8717150';ctx.beginPath();ctx.roundRect(x,y,bw,bh,2);ctx.fill();});ctx.strokeStyle='rgba(255,255,255,.05)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,mid);ctx.lineTo(w,mid);ctx.stroke();}

// ===== CHART MODAL =====
function oMod(sym,name){document.getElementById('mTi').textContent=`${name} (${sym})`;const cm=COML.find(c=>c.t===sym);let tv=sym.replace('=X','').replace('=F','').replace('-USD','USD');if(cm&&cm.v)tv=cm.v;document.getElementById('mBo').innerHTML=`<iframe src="https://s.tradingview.com/widgetembed/?frameElementId=tv&symbol=${encodeURIComponent(tv)}&interval=D&hidesidetoolbar=0&symboledit=1&saveimage=0&toolbarbg=0f1420&theme=dark&style=1&timezone=Europe%2FRome&withdateranges=1&locale=it"></iframe>`;document.getElementById('MOD').classList.add('on');}

document.addEventListener('keydown',e=>{if(e.key==='Escape'){xMod();hideAdd();}});

// ===== ADD ASSET =====
function showAdd(){document.getElementById('addBg').classList.add('on');}
function hideAdd(){document.getElementById('addBg').classList.remove('on');}
function switchAddTab(tab,btn){document.querySelectorAll('.add-tab').forEach(t=>t.classList.remove('on'));btn.classList.add('on');['addUrl','addManual','addIsin'].forEach(id=>document.getElementById(id).style.display='none');document.getElementById('add'+tab.charAt(0).toUpperCase()+tab.slice(1)).style.display='block';}

function parseUrl(url){
  // Yahoo Finance
  let m=url.match(/finance\.yahoo\.com\/quote\/([A-Z0-9\.\-\^=]+)/i);if(m)return m[1];
  // Google Finance
  m=url.match(/google\.com\/finance\/quote\/([A-Z0-9]+):([A-Z]+)/i);if(m)return m[1];
  // TradingView
  m=url.match(/tradingview\.com\/(?:chart|symbols)\/([A-Z0-9:\.]+)/i);if(m)return m[1].replace(':','.');
  // MarketWatch
  m=url.match(/marketwatch\.com\/investing\/(?:stock|fund)\/([a-zA-Z0-9\.]+)/i);if(m)return m[1].toUpperCase();
  // Investing.com
  m=url.match(/investing\.com\/.*?\/([a-z0-9\-]+)/i);if(m)return null; // Can't reliably extract ticker
  // Borsa Italiana
  m=url.match(/borsaitaliana\.it\/.*?isin=([A-Z0-9]+)/i);if(m)return null; // ISIN, handle separately
  return null;
}

function addAsset(){
  const section=document.getElementById('addSection').value;
  const sectionMap={stocks:'stocks',etf:'etf',bonds:'bonds',comm:'comm',crypto:'crypto',fx:'fx'};
  const key=sectionMap[section];
  
  let ticker='',name='';
  
  // Check which tab is active
  if(document.getElementById('addUrl').style.display!=='none'){
    const url=document.getElementById('addUrlInput').value.trim();
    ticker=parseUrl(url);
    if(!ticker){showAddMsg('URL non riconosciuto. Prova con il tab Manuale.',true);return;}
  }else if(document.getElementById('addManual').style.display!=='none'){
    ticker=document.getElementById('addTicker').value.trim().toUpperCase();
    name=document.getElementById('addName').value.trim();
    if(!ticker){showAddMsg('Inserisci un ticker.',true);return;}
  }else{
    const isin=document.getElementById('addIsinInput').value.trim().toUpperCase();
    if(!isin||isin.length!==12){showAddMsg('ISIN deve essere 12 caratteri.',true);return;}
    // Try OpenFIGI lookup
    lookupISIN(isin,section);return;
  }
  
  if(!customAssets[key])customAssets[key]=[];
  if(customAssets[key].some(a=>a.t===ticker)){showAddMsg('Asset già presente!',true);return;}
  customAssets[key].push({t:ticker,n:name||ticker,g:''});
  localStorage.setItem('fs_custom',JSON.stringify(customAssets));
  showAddMsg(`${ticker} aggiunto con successo! Ricarica per vedere i dati.`);
  
  // Clear inputs
  document.getElementById('addUrlInput').value='';
  document.getElementById('addTicker').value='';
  document.getElementById('addName').value='';
}

async function lookupISIN(isin,section){
  showAddMsg('Ricerca ISIN...');
  try{
    const r=await fetch('https://api.openfigi.com/v3/mapping',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify([{idType:'ID_ISIN',idValue:isin}]),signal:AbortSignal.timeout(8000)});
    const d=await r.json();
    if(d[0]?.data?.[0]){
      const item=d[0].data[0];
      const ticker=item.ticker;
      const name=item.name;
      const key={stocks:'stocks',etf:'etf',bonds:'bonds',comm:'comm',crypto:'crypto',fx:'fx'}[section];
      if(!customAssets[key])customAssets[key]=[];
      customAssets[key].push({t:ticker,n:name||ticker,g:''});
      localStorage.setItem('fs_custom',JSON.stringify(customAssets));
      showAddMsg(`Trovato: ${name} (${ticker}). Ricarica per i dati.`);
    }else{showAddMsg('ISIN non trovato.',true);}
  }catch(e){showAddMsg('Errore ricerca ISIN: '+e.message,true);}
}

function showAddMsg(msg,err=false){const el=document.getElementById('addMsg');el.textContent=msg;el.style.display='block';el.style.color=err?'var(--red)':'var(--green)';setTimeout(()=>el.style.display='none',4000);}

:'SE (2nd)',y:2022},{n:'SE (3rd)',y:2025},{n:'Ultra',y:2022},{n:'Ultra 2',y:2023},{n:'Ultra 3',y:2025}],'AirPods':[{n:'AirPods (1st)',y:2016},{n:'AirPods (2nd)',y:2019},{n:'AirPods (3rd)',y:2021},{n:'AirPods 4',y:2024},{n:'AirPods 4 ANC',y:2024},{n:'AirPods Pro',y:2019},{n:'AirPods Pro 2',y:2022},{n:'AirPods Pro 3',y:2025},{n:'AirPods Max',y:2020},{n:'AirPods Max USB-C',y:2024},{n:'AirPods Max 2',y:2025}],'iMac':[{n:'iMac 24" M1',y:2021},{n:'iMac 24" M3',y:2023},{n:'iMac 24" M4',y:2024}],'Mac Mini':[{n:'Mac Mini M1',y:2020},{n:'Mac Mini M2',y:2023},{n:'Mac Mini M4',y:2024},{n:'Mac Mini M4 Pro',y:2024}],'Mac Studio':[{n:'Studio M1 Max',y:2022},{n:'Studio M2 Ultra',y:2023},{n:'Studio M4 Max',y:2025},{n:'Studio M4 Ultra',y:2025}],'Vision Pro':[{n:'Vision Pro',y:2024}]};

function popD(){const c=document.getElementById('aCat').value,ds=ADB[c]||[];['aCur','aTgt'].forEach(id=>{const s=document.getElementById(id);if(!s)return;s.innerHTML='<option value="">Seleziona...</option>';ds.forEach((d,i)=>{s.innerHTML+=`<option value="${i}">${d.n} (${d.y})</option>`;});});const r=document.getElementById('aR');if(r)r.style.display='none';}
function cmpA(){const c=document.getElementById('aCat')?.value,ci=document.getElementById('aCur')?.value,ti=document.getElementById('aTgt')?.value;if(!c||ci===''||ti==='')return;const ds=ADB[c],cur=ds[+ci],tgt=ds[+ti],diff=tgt.y-cur.y;const el=document.getElementById('aR');if(!el)return;el.style.display='block';let v,col,ico;if(diff>0){v=`Target più recente di ${diff} ann${diff===1?'o':'i'}. Upgrade consigliato!`;col='var(--green)';ico='✅';}else if(diff<0){v=`Target più vecchio di ${Math.abs(diff)} ann${Math.abs(diff)===1?'o':'i'}. Non è un upgrade.`;col='var(--red)';ico='⚠️';}else{v='Stessa generazione.';col='var(--orange)';ico='ℹ️';}el.innerHTML=`<div style="display:flex;align-items:center;gap:10px"><span style="font-size:24px">${ico}</span><div><div style="font-weight:700;font-size:14px;color:${col}">${cur.n} → ${tgt.n}</div><div style="color:var(--text2);margin-top:2px;font-size:12px">${v}</div></div></div>`;}
